apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin
  namespace: joplin
  labels:
    app: joplin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: joplin
  template:
    metadata:
      labels:
        app: joplin
    spec:
      initContainers:
        - name: init-db
          image: postgres:17
          command:
            - sh
            - -c
            - |
              export PGPASSWORD="$POSTGRES_SUPERUSER_PASSWORD"
              # Aguardar PostgreSQL ficar pronto
              until pg_isready -h postgresql.postgresql.svc.cluster.local -p 5432 -U postgres; do
                echo "Aguardando PostgreSQL..."
                sleep 3
              done
              # Criar usuário e database se não existirem
              psql -h postgresql.postgresql.svc.cluster.local -U postgres -tc \
                "SELECT 1 FROM pg_roles WHERE rolname='joplin'" | grep -q 1 || \
                psql -h postgresql.postgresql.svc.cluster.local -U postgres -c \
                "CREATE USER joplin WITH PASSWORD '$JOPLIN_DB_PASSWORD'"
              psql -h postgresql.postgresql.svc.cluster.local -U postgres -tc \
                "SELECT 1 FROM pg_database WHERE datname='joplin'" | grep -q 1 || \
                psql -h postgresql.postgresql.svc.cluster.local -U postgres -c \
                "CREATE DATABASE joplin OWNER joplin"
              psql -h postgresql.postgresql.svc.cluster.local -U postgres -c \
                "GRANT ALL PRIVILEGES ON DATABASE joplin TO joplin"
          env:
            - name: POSTGRES_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-credentials
                  key: postgres-superuser-password
            - name: JOPLIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-credentials
                  key: joplin-db-password
      containers:
        - name: joplin
          image: joplin/server:3.5.2
          ports:
            - containerPort: 22300
          env:
            - name: APP_BASE_URL
              value: "https://joplin.bisnaguete.xyz"
            - name: APP_PORT
              value: "22300"
            - name: DB_CLIENT
              value: "pg"
            - name: POSTGRES_HOST
              value: "postgresql.postgresql.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DATABASE
              value: "joplin"
            - name: POSTGRES_USER
              value: "joplin"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-credentials
                  key: joplin-db-password
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: joplin-credentials
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: joplin-credentials
                  key: admin-password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 22300
              httpHeaders:
                - name: Host
                  value: joplin.bisnaguete.xyz
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 22300
              httpHeaders:
                - name: Host
                  value: joplin.bisnaguete.xyz
            initialDelaySeconds: 10
            periodSeconds: 5
