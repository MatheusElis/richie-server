apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin-server
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: joplin
  template:
    metadata:
      labels:
        app: joplin
    spec:
      containers:
      - name: app
        image: joplin/server:latest
        ports:
        - containerPort: 22300
        env:
        - name: APP_PORT
          value: "22300"
        - name: APP_BASE_URL
          value: "https://joplin.cusin-server.duckdns.org"
        - name: JOPLIN_ALLOWED_ORIGINS
          value: "*"
        - name: DB_CLIENT
          value: pg
        - name: POSTGRES_PASSWORD
          value: joplin
        - name: POSTGRES_DATABASE
          value: joplin
        - name: POSTGRES_USER
          value: joplin
        - name: POSTGRES_HOST
          value: postgres.infra.svc.cluster.local
        livenessProbe:
          tcpSocket:
            port: 22300
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 22300
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: joplin
  namespace: apps
spec:
  ports:
  - port: 80
    targetPort: 22300
  selector:
    app: joplin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: joplin
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - joplin.cusin-server.duckdns.org
    secretName: joplin-tls
  rules:
  - host: joplin.cusin-server.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: joplin
            port:
              number: 80
