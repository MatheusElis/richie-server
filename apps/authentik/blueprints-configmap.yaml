apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  forward-auth-domain.yaml: |
    version: 1
    metadata:
      name: forward-auth-domain
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: proxy-provider-domain
        identifiers:
          name: Forward Auth Domain
        attrs:
          name: Forward Auth Domain
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_domain
          external_host: https://auth.bisnaguete.xyz
          cookie_domain: bisnaguete.xyz
      - model: authentik_core.application
        identifiers:
          slug: forward-auth-domain
        attrs:
          name: Forward Auth Domain
          slug: forward-auth-domain
          provider: !KeyOf proxy-provider-domain
          policy_engine_mode: any
      - model: authentik_outposts.outpost
        identifiers:
          managed: goauthentik.io/outposts/embedded
        attrs:
          providers:
            - !KeyOf proxy-provider-domain
  argocd-oidc.yaml: |
    version: 1
    metadata:
      name: argocd-oidc
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: oidc-provider-argocd
        state: created
        identifiers:
          name: ArgoCD
        attrs:
          name: ArgoCD
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: argocd
          redirect_uris:
            - matching_mode: strict
              url: https://argocd.bisnaguete.xyz/auth/callback
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
      - model: authentik_core.application
        state: created
        identifiers:
          slug: argocd
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !KeyOf oidc-provider-argocd
          meta_launch_url: https://argocd.bisnaguete.xyz
          policy_engine_mode: any
