apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    server:
      port: 8080

    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: clock
                hour-format: 24h

          - size: full
            widgets:
              - type: bookmarks
                groups:
                  - title: Homelab
                    links:
                      - title: ArgoCD
                        url: https://argocd.bisnaguete.xyz
                        icon: si:argo
                      - title: Traefik
                        url: https://traefik.bisnaguete.xyz
                        icon: si:traefikproxy
                      - title: pgAdmin
                        url: https://pgadmin.bisnaguete.xyz
                        icon: si:postgresql
