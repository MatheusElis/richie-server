server:
  # Sem UI exposta diretamente — acesso via Traefik após KB-006
  extraArgs:
    - --insecure

  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.bisnaguete.xyz
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    tls: true

configs:
  params:
    server.insecure: true

  # Repositório Git como fonte
  repositories:
    richie-server:
      url: https://github.com/MatheusElis/richie-server
      name: richie-server
      type: git

crds:
  install: true
  keep: true
