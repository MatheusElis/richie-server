apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: joplin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MatheusElis/richie-server.git
    targetRevision: HEAD
    path: apps/joplin
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
