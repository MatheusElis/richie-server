apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-storage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MatheusElis/richie-server.git
    targetRevision: HEAD
    path: apps/shared-storage
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
